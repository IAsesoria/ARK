[package]
name = "ark"
version = "1.0.0"
edition = "2021"
authors = ["NOUS / IAsesoria Informatica"]

[dependencies]
anyhow = "1"
bytemuck = { version = "1", features = ["derive"] }
half = "2"
serde_json = "1"
# Actualizado para compatibilidad con Homebrew sentencepiece 0.2.x+
sentencepiece = "0.13"

# Dependencias Metal
objc2 = "0.5"
objc2-metal = "0.2"
objc2-foundation = "0.2"

[build-dependencies]
cc = "1"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
